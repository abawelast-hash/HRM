[pytest]
# إعدادات pytest لمشروع ShamIn

# مسارات البحث عن الاختبارات
testpaths = tests

# أنماط أسماء ملفات الاختبار
python_files = test_*.py *_test.py

# أنماط أسماء دوال الاختبار
python_functions = test_*

# أنماط أسماء classes الاختبار
python_classes = Test*

# عرض إخراج مفصل
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# علامات مخصصة
markers =
    unit: وحدات (deselect with '-m "not unit"')
    integration: تكامل (deselect with '-m "not integration"')
    api: اختبارات API (deselect with '-m "not api"')
    slow: اختبارات بطيئة (deselect with '-m "not slow"')
    database: اختبارات قاعدة البيانات (deselect with '-m "not database"')
    telegram: اختبارات تلغرام (deselect with '-m "not telegram"')

# تجاهل التحذيرات
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# الحد الأدنى لإصدار pytest
minversion = 7.0

# التغطية
# addopts += --cov=src --cov-report=html --cov-report=term-missing

# المهل الزمنية (timeout)
timeout = 30
timeout_method = thread

# asyncio
asyncio_mode = auto

# الترميز
console_output_style = progress

# التجميع
# addopts += --collect-only
